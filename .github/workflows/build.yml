name: Build Lean Clash Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"
  push:
    branches: [main]
    paths-ignore:
      - "**/README.md"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        run: |
          echo "TAG=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=Released on $(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV

          # reject: anti-AD 精选中文广告域名，过滤到根域名
          echo "ANTI_AD=https://anti-ad.net/domains.txt" >> $GITHUB_ENV

          # proxy: GFW 封锁列表，~4k 条
          echo "GFW=https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/gfw.txt" >> $GITHUB_ENV

          # IP 段列表
          echo "CN_CIDR=https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/cn.txt" >> $GITHUB_ENV
          echo "LAN_CIDR=https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/private.txt" >> $GITHUB_ENV
          echo "TELEGRAM_CIDR=https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/telegram.txt" >> $GITHUB_ENV

          # 小列表
          echo "APPLE=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/apple.china.conf" >> $GITHUB_ENV
          echo "GOOGLE=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/google.china.conf" >> $GITHUB_ENV
          echo "ICLOUD=https://raw.githubusercontent.com/Loyalsoldier/domain-list-custom/release/icloud.txt" >> $GITHUB_ENV
          echo "PRIVATE=https://raw.githubusercontent.com/Loyalsoldier/domain-list-custom/release/private.txt" >> $GITHUB_ENV

      # ── reject ────────────────────────────────────────────────────────────────
      # anti-AD 包含子域名 (~111k 条)，过滤到根域名（X.Y 格式）→ ~5k 条
      # +.doubleclick.net 一条规则已覆盖所有 *.doubleclick.net，子域条目全部冗余
      - name: Generate reject.yaml
        run: |
          echo "payload:" > reject.yaml
          curl -sSL ${ANTI_AD} \
            | grep -v '^#' \
            | grep -v '^$' \
            | grep -E '^[^.]+\.[^.]+$' \
            | sort -u \
            | awk '{printf "  - '"'"'+.%s'"'"'\n", $0}' \
            >> reject.yaml
          echo "reject.yaml: $(grep -c '^ ' reject.yaml) entries"

      # ── proxy ─────────────────────────────────────────────────────────────────
      # GFW 封锁列表：~4k 条裸域名，只包含真正被封锁的域名
      - name: Generate proxy.yaml
        run: |
          echo "payload:" > proxy.yaml
          curl -sSL ${GFW} \
            | grep -v '^#' \
            | grep -v '^$' \
            | sort -u \
            | awk '{printf "  - '"'"'+.%s'"'"'\n", $0}' \
            >> proxy.yaml
          echo "proxy.yaml: $(grep -c '^ ' proxy.yaml) entries"

      # ── direct ────────────────────────────────────────────────────────────────
      # 使用仓库内静态精选列表（src/direct-custom.txt），约 130 条
      # 覆盖 99% 家用场景的中国境内流量（百度、腾讯、阿里、字节、B站等主要平台）
      # 未覆盖的中文域名会走默认规则（通常为代理，速度略降但可用）
      # 需要新增域名？直接向 src/direct-custom.txt 提 PR
      - name: Generate direct.yaml
        run: |
          echo "payload:" > direct.yaml
          grep -v '^#' src/direct-custom.txt \
            | grep -v '^$' \
            | sort -u \
            | awk '{printf "  - '"'"'+.%s'"'"'\n", $0}' \
            >> direct.yaml
          echo "direct.yaml: $(grep -c '^ ' direct.yaml) entries"

      # ── cncidr ────────────────────────────────────────────────────────────────
      - name: Generate cncidr.yaml
        run: |
          echo "payload:" > cncidr.yaml
          curl -sSL ${CN_CIDR} | grep -Ev '^(#|$)' \
            | awk '{printf "  - '"'"'%s'"'"'\n", $0}' >> cncidr.yaml
          echo "cncidr.yaml: $(grep -c '^ ' cncidr.yaml) entries"

      # ── lancidr ───────────────────────────────────────────────────────────────
      - name: Generate lancidr.yaml
        run: |
          echo "payload:" > lancidr.yaml
          curl -sSL ${LAN_CIDR} | grep -Ev '^(#|$)' \
            | awk '{printf "  - '"'"'%s'"'"'\n", $0}' >> lancidr.yaml

      # ── telegramcidr ──────────────────────────────────────────────────────────
      - name: Generate telegramcidr.yaml
        run: |
          echo "payload:" > telegramcidr.yaml
          curl -sSL ${TELEGRAM_CIDR} | grep -Ev '^(#|$)' \
            | awk '{printf "  - '"'"'%s'"'"'\n", $0}' >> telegramcidr.yaml

      # ── apple ─────────────────────────────────────────────────────────────────
      - name: Generate apple.yaml
        run: |
          echo "payload:" > apple.yaml
          curl -sSL ${APPLE} \
            | grep '^server=/' \
            | sed 's|^server=/||; s|/.*||' \
            | sort -u \
            | awk '{printf "  - '"'"'+.%s'"'"'\n", $0}' >> apple.yaml

      # ── google ────────────────────────────────────────────────────────────────
      - name: Generate google.yaml
        run: |
          echo "payload:" > google.yaml
          curl -sSL ${GOOGLE} \
            | grep '^server=/' \
            | sed 's|^server=/||; s|/.*||' \
            | sort -u \
            | awk '{printf "  - '"'"'+.%s'"'"'\n", $0}' >> google.yaml

      # ── icloud ────────────────────────────────────────────────────────────────
      - name: Generate icloud.yaml
        run: |
          echo "payload:" > icloud.yaml
          curl -sSL ${ICLOUD} | grep '^full:'   | sed 's/^full://'   | awk '{printf "  - '"'"'%s'"'"'\n", $0}' >> icloud.yaml
          curl -sSL ${ICLOUD} | grep '^domain:' | sed 's/^domain://' | awk '{printf "  - '"'"'+.%s'"'"'\n", $0}' >> icloud.yaml

      # ── private ───────────────────────────────────────────────────────────────
      - name: Generate private.yaml
        run: |
          echo "payload:" > private.yaml
          curl -sSL ${PRIVATE} | grep '^full:'   | sed 's/^full://'   | awk '{printf "  - '"'"'%s'"'"'\n", $0}' >> private.yaml
          curl -sSL ${PRIVATE} | grep '^domain:' | sed 's/^domain://' | awk '{printf "  - '"'"'+.%s'"'"'\n", $0}' >> private.yaml

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Print rule counts
        run: |
          echo "=== Rule counts ==="
          total=0
          for f in reject proxy direct cncidr lancidr telegramcidr apple google icloud private; do
            count=$(grep -c '^ ' ${f}.yaml 2>/dev/null || echo 0)
            total=$((total + count))
            printf "  %-22s %6d entries\n" "${f}.yaml" "$count"
          done
          printf "  %-22s %6d entries\n" "TOTAL" "$total"

      # ── Release ───────────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            ## 精简版规则集 — ${{ env.RELEASE_NAME }}

            | 文件 | 说明 | 对比原版 |
            |------|------|----------|
            | `reject.yaml` | 广告/恶意域名拦截 (anti-AD 根域名) | ~5k vs 167k → 节省97% |
            | `proxy.yaml` | 代理域名 (GFW 封锁列表) | ~4k vs 26k → 节省85% |
            | `direct.yaml` | 直连域名 (精选中国主流平台 ~130 条) | ~130 vs 116k → 节省99% |
            | `cncidr.yaml` | 中国大陆 IP 段 | 同原版 |
            | `lancidr.yaml` | 局域网 IP 段 | 同原版 |
            | `telegramcidr.yaml` | Telegram IP 段 | 同原版 |
            | `apple.yaml` | Apple 服务直连 | 同原版 |
            | `google.yaml` | Google 服务直连 | 同原版 |
            | `icloud.yaml` | iCloud 服务直连 | 同原版 |
            | `private.yaml` | 私有域名 | 同原版 |
          files: |
            reject.yaml
            proxy.yaml
            direct.yaml
            cncidr.yaml
            lancidr.yaml
            telegramcidr.yaml
            apple.yaml
            google.yaml
            icloud.yaml
            private.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
